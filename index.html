        <script>
        var map = L.map('map', {

        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleHybrid_0');
        map.getPane('pane_GoogleHybrid_0').style.zIndex = 400;
        var layer_GoogleHybrid_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {

            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_GoogleHybrid_0;
        map.addLayer(layer_GoogleHybrid_0);

                    <tr>\

            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        map.createPane('pane_carteleria_madera_1');
        map.getPane('pane_carteleria_madera_1').style.zIndex = 401;
        map.getPane('pane_carteleria_madera_1').style['mix-blend-mode'] = 'normal';
        var layer_carteleria_madera_1 = new L.geoJson.multiStyle(json_carteleria_madera_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_carteleria_madera_1',
            layerName: 'layer_carteleria_madera_1',
            pane: 'pane_carteleria_madera_1',
            onEachFeature: pop_carteleria_madera_1,
            pointToLayers: [function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_carteleria_madera_1_0(feature));
            },function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_carteleria_madera_1_1(feature));
            },function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };

            },
        ]});
        bounds_group.addLayer(layer_carteleria_madera_1);
        map.addLayer(layer_carteleria_madera_1);
        var overlaysTree = [
            {label: '<img src="legend/carteleria_madera_1.png" /> carteleria_madera', layer: layer_carteleria_madera_1},
            {label: "Google Hybrid", layer: layer_GoogleHybrid_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: false, 
        });
        lay.addTo(map);
		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();
        var mapDiv = document.getElementById('map');
        var row = document.createElement('div');
        row.className="row";
        row.id="all";
        row.style.height = "100%";
        var col1 = document.createElement('div');
        col1.className="col9";
        col1.id = "mapWindow";
        col1.style.height = "99%";
        col1.style.width = "80%";
        col1.style.display = "inline-block";
        var col2 = document.createElement('div');
        col2.className="col3";
        col2.id = "menu";
        col2.style.display = "inline-block";
        mapDiv.parentNode.insertBefore(row, mapDiv);
        document.getElementById("all").appendChild(col1);
        document.getElementById("all").appendChild(col2);
        col1.appendChild(mapDiv)
        var Filters = {"TEMA_INSTAL": "str","TIPO_CARTEL": "str"};
        function filterFunc() {
          map.eachLayer(function(lyr){
          if ("options" in lyr && "dataVar" in lyr["options"]){
            features = this[lyr["options"]["dataVar"]].features.slice(0);
            try{
              for (key in Filters){
                keyS = key.replace(/[^a-zA-Z0-9_]/g, "")
                if (Filters[key] == "str" || Filters[key] == "bool"){
                  var selection = [];
                  var options = document.getElementById("sel_" + keyS).options
                  for (var i=0; i < options.length; i++) {
                    if (options[i].selected) selection.push(options[i].value);
                  }
                    try{
                      if (key in features[0].properties){
                        for (i = features.length - 1;
                          i >= 0; --i){
                          if (selection.indexOf(
                          features[i].properties[key])<0
                          && selection.length>0) {
                          features.splice(i,1);
                          }
                        }
                      }
                    } catch(err){
                  }
                }
                if (Filters[key] == "int"){
                  sliderVals =  document.getElementById(
                    "div_" + keyS).noUiSlider.get();
                  try{
                    if (key in features[0].properties){
                    for (i = features.length - 1; i >= 0; --i){
                      if (parseInt(features[i].properties[key])
                          < sliderVals[0]
                          || parseInt(features[i].properties[key])
                          > sliderVals[1]){
                            features.splice(i,1);
                          }
                        }
                      }
                    } catch(err){
                    }
                  }
                if (Filters[key] == "real"){
                  sliderVals =  document.getElementById(
                    "div_" + keyS).noUiSlider.get();
                  try{
                    if (key in features[0].properties){
                    for (i = features.length - 1; i >= 0; --i){
                      if (features[i].properties[key]
                          < sliderVals[0]
                          || features[i].properties[key]
                          > sliderVals[1]){
                            features.splice(i,1);
                          }
                        }
                      }
                    } catch(err){
                    }
                  }
                if (Filters[key] == "date"
                  || Filters[key] == "datetime"
                  || Filters[key] == "time"){
                  try{
                    if (key in features[0].properties){
                      HTMLkey = key.replace(/[&\/\\#,+()$~%.'":*?<>{} ]/g, '');
                      startdate = document.getElementById("dat_" +
                        HTMLkey + "_date1").value.replace(" ", "T");
                      enddate = document.getElementById("dat_" +
                        HTMLkey + "_date2").value.replace(" ", "T");
                      for (i = features.length - 1; i >= 0; --i){
                        if (features[i].properties[key] < startdate
                          || features[i].properties[key] > enddate){
                          features.splice(i,1);
                        }
                      }
                    }
                  } catch(err){
                  }
                }
              }
            } catch(err){
            }
          this[lyr["options"]["layerName"]].clearLayers();
          this[lyr["options"]["layerName"]].addData(features);
          }
          })
        }
            document.getElementById("menu").appendChild(
                document.createElement("div"));
            var div_TEMA_INSTAL = document.createElement('div');
            div_TEMA_INSTAL.id = "div_TEMA_INSTAL";
            div_TEMA_INSTAL.className= "filterselect";
            document.getElementById("menu").appendChild(div_TEMA_INSTAL);
            sel_TEMA_INSTAL = document.createElement('select');
            sel_TEMA_INSTAL.multiple = true;
            sel_TEMA_INSTAL.size = 7;
            sel_TEMA_INSTAL.id = "sel_TEMA_INSTAL";
            var TEMA_INSTAL_options_str = "<option value='' unselected></option>";
            sel_TEMA_INSTAL.onchange = function(){filterFunc()};
            TEMA_INSTAL_options_str  += '<option value="NULL">NULL</option>';
            TEMA_INSTAL_options_str  += '<option value="Aves_Guadiana">Aves_Guadiana</option>';
            TEMA_INSTAL_options_str  += '<option value="Aves_insectivoras">Aves_insectivoras</option>';
            TEMA_INSTAL_options_str  += '<option value="Invasoras">Invasoras</option>';
            TEMA_INSTAL_options_str  += '<option value="Peces_guadiana">Peces_guadiana</option>';
            TEMA_INSTAL_options_str  += '<option value="Vegetación_ribera">Vegetación_ribera</option>';
            TEMA_INSTAL_options_str  += '<option value="respeta_entorno">respeta_entorno</option>';
            sel_TEMA_INSTAL.innerHTML = TEMA_INSTAL_options_str;
            div_TEMA_INSTAL.appendChild(sel_TEMA_INSTAL);
            var lab_TEMA_INSTAL = document.createElement('div');
            lab_TEMA_INSTAL.innerHTML = 'TEMA_INSTAL';
            lab_TEMA_INSTAL.className = 'filterlabel';
            div_TEMA_INSTAL.appendChild(lab_TEMA_INSTAL);
            var reset_TEMA_INSTAL = document.createElement('div');
            reset_TEMA_INSTAL.innerHTML = 'clear filter';
            reset_TEMA_INSTAL.className = 'filterlabel';
            reset_TEMA_INSTAL.onclick = function() {
                var options = document.getElementById("sel_TEMA_INSTAL").options;
                for (var i=0; i < options.length; i++) {
                    options[i].selected = false;
                }
                filterFunc();
            };
            div_TEMA_INSTAL.appendChild(reset_TEMA_INSTAL);
            document.getElementById("menu").appendChild(
                document.createElement("div"));
            var div_TIPO_CARTEL = document.createElement('div');
            div_TIPO_CARTEL.id = "div_TIPO_CARTEL";
            div_TIPO_CARTEL.className= "filterselect";
            document.getElementById("menu").appendChild(div_TIPO_CARTEL);
            sel_TIPO_CARTEL = document.createElement('select');
            sel_TIPO_CARTEL.multiple = true;
            sel_TIPO_CARTEL.size = 2;
            sel_TIPO_CARTEL.id = "sel_TIPO_CARTEL";
            var TIPO_CARTEL_options_str = "<option value='' unselected></option>";
            sel_TIPO_CARTEL.onchange = function(){filterFunc()};
            TIPO_CARTEL_options_str  += '<option value="MADERA">MADERA</option>';
            TIPO_CARTEL_options_str  += '<option value="METAL">METAL</option>';
            sel_TIPO_CARTEL.innerHTML = TIPO_CARTEL_options_str;
            div_TIPO_CARTEL.appendChild(sel_TIPO_CARTEL);
            var lab_TIPO_CARTEL = document.createElement('div');
            lab_TIPO_CARTEL.innerHTML = 'TIPO_CARTEL';
            lab_TIPO_CARTEL.className = 'filterlabel';
            div_TIPO_CARTEL.appendChild(lab_TIPO_CARTEL);
            var reset_TIPO_CARTEL = document.createElement('div');
            reset_TIPO_CARTEL.innerHTML = 'clear filter';
            reset_TIPO_CARTEL.className = 'filterlabel';
            reset_TIPO_CARTEL.onclick = function() {
                var options = document.getElementById("sel_TIPO_CARTEL").options;
                for (var i=0; i < options.length; i++) {
                    options[i].selected = false;
                }
                filterFunc();
            };
            div_TIPO_CARTEL.appendChild(reset_TIPO_CARTEL);
        </script>
