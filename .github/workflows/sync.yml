name: Sync to valverdino

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VALVERDINO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push via SSH
        run: |
          git remote add valverdino git@github.com:valverdino/carteles.git
          git push valverdino --all --force
          git push valverdino --tags --force
